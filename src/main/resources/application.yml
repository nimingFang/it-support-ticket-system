spring:
  application:
    name: ticketing
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 10
      connection-timeout: 50000

  # Swagger
springdoc:
  api-docs:
    path: /api-docs

# JWT（生产环境通过环境变量 JWT_SECRET 注入，开发环境在 application-dev.yml 中配置默认值）
jwt:
  secret: ${JWT_SECRET}
  expiration: 7200000

# Logging
logging:
  level:
    org.springframework.security: DEBUG
