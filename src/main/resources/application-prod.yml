# 生产/容器环境：所有动态配置通过环境变量注入
spring:
  datasource:
    url: jdbc:mysql://${SPRING_DATASOURCE_HOST:mysql}:3306/${SPRING_DATASOURCE_DB:it_service_ticket_system}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root123}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: 6379
  jpa:
    show-sql: false

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    org.springframework.security: WARN
